<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <radialGradient id="bulbglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fef08a;stop-opacity:0.4"/>
      <stop offset="60%" style="stop-color:#fde047;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#fde047;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Funnel -->
  <path d="M28 34 L92 34 L68 64 L68 82 L52 82 L52 64 Z" fill="none" stroke="url(#fg)" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Orbit path -->
  <ellipse cx="60" cy="20" rx="32" ry="9" fill="none" stroke="#4b5563" stroke-width="0.8" stroke-dasharray="3 3"/>
  <!-- Three orbiting dots: red, green, orange -->
  <circle r="5" fill="#ef4444" opacity="0.9">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M60,20 A32,9 0 1,1 59.99,20" begin="0s"/>
  </circle>
  <circle r="5" fill="#22c55e" opacity="0.9">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M60,20 A32,9 0 1,1 59.99,20" begin="0.83s"/>
  </circle>
  <circle r="4.5" fill="#f97316" opacity="0.9">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M60,20 A32,9 0 1,1 59.99,20" begin="1.66s"/>
  </circle>
  <!-- Lightbulb glow -->
  <circle cx="60" cy="93" r="18" fill="url(#bulbglow)"/>
  <!-- Lightbulb -->
  <g transform="translate(60,95)">
    <!-- Glass bulb -->
    <path d="M0-14 C-8-14 -12-8 -12-3 C-12 3 -7 6 -6 9 L6 9 C7 6 12 3 12-3 C12-8 8-14 0-14Z" fill="#f0f0f5" stroke="#d4d4dc" stroke-width="1" opacity="0.95"/>
    <!-- Inner highlight -->
    <path d="M-4-10 C-6-8 -7-4 -7-1" fill="none" stroke="white" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <!-- Filament -->
    <path d="M-3 0 Q0-5 3 0" fill="none" stroke="#facc15" stroke-width="2" opacity="0.8"/>
    <path d="M-2 2 Q0-2 2 2" fill="none" stroke="#fde047" stroke-width="1.5" opacity="0.5"/>
    <!-- Base/screw -->
    <rect x="-5" y="9" width="10" height="3.5" rx="1.5" fill="#a1a1aa" opacity="0.8"/>
    <rect x="-4" y="12.5" width="8" height="2.5" rx="1" fill="#71717a" opacity="0.7"/>
    <!-- Glow rays -->
    <line x1="-16" y1="-6" x2="-13" y2="-4" stroke="#fde047" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    <line x1="16" y1="-6" x2="13" y2="-4" stroke="#fde047" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    <line x1="0" y1="-20" x2="0" y2="-17" stroke="#fde047" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
    <line x1="-12" y1="-14" x2="-10" y2="-11" stroke="#fde047" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
    <line x1="12" y1="-14" x2="10" y2="-11" stroke="#fde047" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  </g>
</svg>
