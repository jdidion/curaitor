<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="url(#g1)" stroke-width="3" opacity="0.3"/>
  <!-- Stylized C from stacked article shapes -->
  <g transform="translate(60,60)">
    <!-- Top article -->
    <rect x="-8" y="-38" width="32" height="6" rx="2" fill="#6366f1" opacity="0.9" transform="rotate(-30)"/>
    <rect x="-8" y="-28" width="24" height="3" rx="1" fill="#6366f1" opacity="0.5" transform="rotate(-30)"/>
    <!-- Middle articles (the opening of the C) -->
    <rect x="-38" y="-3" width="32" height="6" rx="2" fill="#8b5cf6" opacity="0.9"/>
    <rect x="-38" y="7" width="24" height="3" rx="1" fill="#8b5cf6" opacity="0.5"/>
    <!-- Bottom article -->
    <rect x="-8" y="32" width="32" height="6" rx="2" fill="#a78bfa" opacity="0.9" transform="rotate(30)"/>
    <rect x="-8" y="42" width="24" height="3" rx="1" fill="#a78bfa" opacity="0.5" transform="rotate(30)"/>
    <!-- AI sparkle dot -->
    <circle cx="18" cy="0" r="4" fill="#c4b5fd"/>
    <circle cx="18" cy="0" r="7" fill="#c4b5fd" opacity="0.2"/>
  </g>
</svg>
